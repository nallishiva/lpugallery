<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WMXN52Q8JP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WMXN52Q8JP');
  </script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — LPU Clicks</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8295408944534400" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --dark: #0d0d0d;
      --dark-2: #141414;
      --dark-3: #1c1c1c;
      --white: #ffffff;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
      /* Fade-in on page load */
      opacity: 0;
      animation: pageEnter 0.7s ease 0.1s forwards;
    }

    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed; width: 8px; height: 8px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1px solid rgba(201,168,76,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      padding: 22px 60px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300;
      letter-spacing: 4px; color: var(--gold);
      text-transform: uppercase; text-decoration: none;
    }
    .nav-links { display: flex; gap: 48px; list-style: none; }
    .nav-links a {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.6); text-decoration: none;
      position: relative; transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px; background: var(--gold);
      transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--gold); }
    .nav-links a.active::after { width: 100%; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 64px 60px 48px;
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .page-header-left {}
    .page-eyebrow {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
      display: flex; align-items: center; gap: 14px;
    }
    .page-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 7vw, 88px);
      font-weight: 300; line-height: 0.95; letter-spacing: -1px;
    }
    .page-title em { font-style: italic; color: var(--gold); }
    .photo-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px; font-weight: 300;
      color: rgba(201,168,76,0.15); line-height: 1;
      letter-spacing: -2px;
    }
    .photo-count span { font-size: 13px; letter-spacing: 3px; color: rgba(255,255,255,0.3); display: block; text-align: right; font-family: 'Outfit', sans-serif; margin-top: 4px; }

    /* ── MASONRY GRID ── */
    .masonry-wrap {
      padding: 48px 40px 80px;
    }
    .masonry {
      columns: 4;
      column-gap: 6px;
    }
    @media (max-width: 1200px) { .masonry { columns: 3; } }
    @media (max-width: 800px)  { .masonry { columns: 2; } }
    @media (max-width: 500px)  { .masonry { columns: 1; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: block;
    }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.5s ease;
      filter: brightness(0.88) contrast(1.05) saturate(0.92);
    }
    .masonry-item:hover img {
      transform: scale(1.04);
      filter: brightness(1.0) contrast(1.08) saturate(1.1);
    }

    /* Gold overlay on hover */
    .masonry-item .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(201,168,76,0.0) 0%,
        rgba(201,168,76,0.0) 60%,
        rgba(201,168,76,0.18) 100%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .masonry-item:hover .overlay { opacity: 1; }

    /* Bottom label on hover */
    .masonry-item .item-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px 16px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      display: flex; justify-content: space-between; align-items: flex-end;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.35s ease;
    }
    .masonry-item:hover .item-label { opacity: 1; transform: translateY(0); }
    .item-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 300;
      color: rgba(201,168,76,0.7); line-height: 1;
    }
    .item-expand {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* Gold corner accent on hover */
    .masonry-item::before, .masonry-item::after {
      content: ''; position: absolute;
      width: 0; height: 0;
      transition: all 0.3s ease;
      z-index: 2; pointer-events: none;
    }
    .masonry-item::before {
      top: 0; left: 0;
      border-top: 0px solid var(--gold);
      border-left: 0px solid var(--gold);
    }
    .masonry-item::after {
      bottom: 0; right: 0;
      border-bottom: 0px solid var(--gold);
      border-right: 0px solid var(--gold);
    }
    .masonry-item:hover::before {
      width: 28px; height: 28px;
      border-top-width: 2px; border-left-width: 2px;
    }
    .masonry-item:hover::after {
      width: 28px; height: 28px;
      border-bottom-width: 2px; border-right-width: 2px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease, background 0.35s ease;
    }
    .lightbox.open {
      opacity: 1; pointer-events: all;
      background: rgba(0,0,0,0.96);
    }

    .lb-inner {
      position: relative;
      max-width: min(88vw, 1100px);
      max-height: 88vh;
      transform: scale(0.92);
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      display: flex; flex-direction: column; align-items: center;
    }
    .lightbox.open .lb-inner { transform: scale(1); }

    .lb-img-wrap {
      position: relative;
      max-width: 100%; max-height: 80vh;
    }
    .lb-img-wrap img {
      max-width: min(88vw, 1100px);
      max-height: 80vh;
      object-fit: contain;
      display: block;
      filter: brightness(0.97) contrast(1.04);
    }

    /* Corner frame */
    .lb-frame {
      position: absolute; inset: -10px;
      pointer-events: none;
    }
    .lb-frame::before {
      content: ''; position: absolute;
      top: 0; left: 0; width: 36px; height: 36px;
      border-top: 2px solid var(--gold); border-left: 2px solid var(--gold);
    }
    .lb-frame::after {
      content: ''; position: absolute;
      bottom: 0; right: 0; width: 36px; height: 36px;
      border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold);
    }

    /* Caption */
    .lb-caption {
      margin-top: 20px;
      display: flex; align-items: center; gap: 20px;
      width: 100%; justify-content: space-between;
    }
    .lb-counter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; color: var(--gold);
    }
    .lb-hint {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .lb-credit {
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .lb-credit span { color: var(--gold); }

    /* Close button */
    .lb-close {
      position: absolute; top: -52px; right: 0;
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: rgba(255,255,255,0.5);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .lb-close:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

    /* Prev / Next arrows */
    .lb-prev, .lb-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.6);
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; z-index: 9001;
    }
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }
    .lb-prev:hover, .lb-next:hover {
      border-color: var(--gold); color: var(--gold);
      background: rgba(201,168,76,0.1);
    }

    /* Image transition */
    .lb-img-wrap.switching img {
      opacity: 0; transform: scale(0.97);
    }
    .lb-img-wrap img {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    /* ── FOOTER ── */
    footer {
      padding: 40px 60px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 300;
      letter-spacing: 4px; color: var(--gold);
    }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

    @media (max-width: 768px) {
      nav { padding: 18px 20px; }
      .nav-links { gap: 24px; }
      .page-header { padding: 40px 20px 32px; flex-direction: column; align-items: flex-start; gap: 16px; }
      .masonry-wrap { padding: 24px 12px 60px; }
      .masonry { column-gap: 4px; }
      .masonry-item { margin-bottom: 4px; }
      .lb-prev { left: 8px; } .lb-next { right: 8px; }
      footer { flex-direction: column; gap: 12px; text-align: center; padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">LPU Clicks</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery1.html" class="active">Gallery</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <p class="page-eyebrow">LPU Campus · @_____shiva_</p>
      <h1 class="page-title">The <em>Gallery</em></h1>
    </div>
    <div class="photo-count">
      29
      <span>photographs</span>
    </div>
  </div>

  <!-- MASONRY GALLERY -->
  <div class="masonry-wrap">
    <div class="masonry" id="masonryGrid">
      <!-- Items injected by JS below -->
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lb-inner">
      <button class="lb-close" id="lbClose">✕</button>
      <div class="lb-img-wrap" id="lbImgWrap">
        <div class="lb-frame"></div>
        <img src="" alt="LPU Campus" id="lbImg">
      </div>
      <div class="lb-caption">
        <span class="lb-counter" id="lbCounter">01 / 29</span>
        <span class="lb-hint">← → to navigate · ESC to close</span>
        <span class="lb-credit">@<span>_____shiva_</span></span>
      </div>
    </div>
  </div>
  <button class="lb-prev" id="lbPrev">&#8592;</button>
  <button class="lb-next" id="lbNext">&#8594;</button>

  <!-- FOOTER -->
  <footer>
    <div class="footer-brand">LPU Clicks</div>
    <div class="footer-copy">© 2022 · Web Marketing Project · LPU</div>
  </footer>

  <script>
    // ── IMAGE LIST (forward slashes, all 29 photos) ──
    const photos = [
      'gallery.jpg/img28.jpg',
      'gallery.jpg/img29.jpg',
      'gallery.jpg/img31.jpg',
      'gallery.jpg/img19.jpg',
      'gallery.jpg/img27.jpg',
      'gallery.jpg/img26.jpg',
      'gallery.jpg/img25.jpg',
      'gallery.jpg/img24.jpg',
      'gallery.jpg/img23.jpg',
      'gallery.jpg/img22.jpg',
      'gallery.jpg/img21.jpg',
      'gallery.jpg/img20.jpg',
      'gallery.jpg/img18.jpg',
      'gallery.jpg/img17.jpg',
      'gallery.jpg/img15.jpg',
      'gallery.jpg/img11.jpg',
      'gallery.jpg/img14.jpg',
      'gallery.jpg/img13.jpg',
      'gallery.jpg/img12.jpg',
      'gallery.jpg/img10.jpg',
      'gallery.jpg/img1.jpg',
      'gallery.jpg/img9.jpg',
      'gallery.jpg/img8.jpg',
      'gallery.jpg/img7.jpg',
      'gallery.jpg/img6.jpg',
      'gallery.jpg/img5.jpg',
      'gallery.jpg/img4.jpg',
      'gallery.jpg/img3.jpg',
      'gallery.jpg/img2.jpg',
    ];

    // ── BUILD MASONRY ──
    const grid = document.getElementById('masonryGrid');
    photos.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'masonry-item';
      item.innerHTML = `
        <img src="${src}" alt="LPU Campus photo ${i+1}" loading="lazy">
        <div class="overlay"></div>
        <div class="item-label">
          <span class="item-num">${String(i+1).padStart(2,'0')}</span>
          <span class="item-expand">expand</span>
        </div>`;
      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
    });

    // ── LIGHTBOX ──
    const lb     = document.getElementById('lightbox');
    const lbImg  = document.getElementById('lbImg');
    const lbWrap = document.getElementById('lbImgWrap');
    const lbCtr  = document.getElementById('lbCounter');
    let current  = 0;

    function openLightbox(idx) {
      current = idx;
      lbImg.src = photos[current];
      lbCtr.textContent = `${String(current+1).padStart(2,'0')} / ${photos.length}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      // show arrows
      document.getElementById('lbPrev').style.display = 'flex';
      document.getElementById('lbNext').style.display = 'flex';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbWrap.classList.add('switching');
      setTimeout(() => {
        lbImg.src = photos[current];
        lbCtr.textContent = `${String(current+1).padStart(2,'0')} / ${photos.length}`;
        lbWrap.classList.remove('switching');
      }, 200);
    }

    document.getElementById('lbClose').onclick = closeLightbox;
    document.getElementById('lbPrev').onclick  = () => navigate(-1);
    document.getElementById('lbNext').onclick  = () => navigate(1);

    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   navigate(-1);
      if (e.key === 'ArrowRight')  navigate(1);
    });

    // Touch swipe support
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
    lb.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
    });

    // ── CUSTOM CURSOR ──
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx=0, my=0, rx=0, ry=0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cur.style.left = mx+'px'; cur.style.top = my+'px';
    });
    (function loop() {
      rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
      ring.style.left = rx+'px'; ring.style.top = ry+'px';
      requestAnimationFrame(loop);
    })();
    document.querySelectorAll('a, button, .masonry-item').forEach(el => {
      el.addEventListener('mouseenter', () => {
        ring.style.transform = 'translate(-50%,-50%) scale(1.8)';
        ring.style.borderColor = 'rgba(201,168,76,0.8)';
      });
      el.addEventListener('mouseleave', () => {
        ring.style.transform = 'translate(-50%,-50%) scale(1)';
        ring.style.borderColor = 'rgba(201,168,76,0.5)';
      });
    });
  </script>
</body>
</html>
