<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WMXN52Q8JP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WMXN52Q8JP');
  </script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — LPU Clicks</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8295408944534400" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --white: #ffffff;
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      cursor: none !important;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      opacity: 0;
      animation: pageEnter 0.6s ease 0.05s forwards;
    }

    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed; width: 8px; height: 8px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 99999;
      transform: translate(-50%, -50%);
      will-change: left, top;
    }
    .cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1px solid rgba(201,168,76,0.55); border-radius: 50%;
      pointer-events: none; z-index: 99998;
      transform: translate(-50%, -50%);
      transition: border-color 0.15s, transform 0.15s;
      will-change: left, top;
    }
    .cursor-ring.big {
      transform: translate(-50%, -50%) scale(1.8);
      border-color: rgba(201,168,76,0.9);
    }

    /* CSS-only cursor ring expansion — works on ALL elements, no JS needed */
    a:hover ~ #cursorRing,
    button:hover ~ #cursorRing { transform: translate(-50%, -50%) scale(1.8); }

    /* We use a simpler trick: body data attribute toggled by JS on hover */
    body.on-hover .cursor-ring {
      transform: translate(-50%, -50%) scale(1.8);
      border-color: rgba(201,168,76,0.9);
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 500;
      padding: 22px 60px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(13,13,13,0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300;
      letter-spacing: 4px; color: var(--gold);
      text-transform: uppercase; text-decoration: none;
    }
    .nav-links { display: flex; gap: 48px; list-style: none; }
    .nav-links a {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.6); text-decoration: none;
      position: relative; transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px; background: var(--gold);
      transition: width 0.3s ease;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 56px 60px 40px;
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .page-eyebrow {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
      display: flex; align-items: center; gap: 14px;
    }
    .page-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 7vw, 84px);
      font-weight: 300; line-height: 0.95; letter-spacing: -1px;
    }
    .page-title em { font-style: italic; color: var(--gold); }
    .photo-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 68px; font-weight: 300;
      color: rgba(201,168,76,0.12); line-height: 1; letter-spacing: -2px;
    }
    .photo-count span {
      font-size: 12px; letter-spacing: 3px;
      color: rgba(255,255,255,0.28); display: block;
      text-align: right; font-family: 'Outfit', sans-serif; margin-top: 4px;
    }

    /* ── JS MASONRY — 4 flex columns side by side ── */
    .masonry-wrap { padding: 40px 36px 80px; }

    /* The outer row is just a flex container */
    .masonry-row {
      display: flex;
      gap: 6px;
      align-items: flex-start; /* columns independent — no stretching */
    }

    /* Each column is a flex column */
    .masonry-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Each photo card */
    .masonry-item {
      position: relative;
      overflow: hidden;
      display: block;
      width: 100%;
      /* NO break-inside, NO columns weirdness */
    }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94),
                  filter 0.4s ease;
      filter: brightness(0.85) contrast(1.06) saturate(0.9);
    }
    .masonry-item:hover img {
      transform: scale(1.05);
      filter: brightness(1.0) contrast(1.08) saturate(1.1);
    }

    /* Gold corner accents */
    .masonry-item::before,
    .masonry-item::after {
      content: ''; position: absolute;
      width: 0; height: 0;
      transition: width 0.28s ease, height 0.28s ease;
      z-index: 3; pointer-events: none;
    }
    .masonry-item::before { top: 0; left: 0; border-top: 0px solid var(--gold); border-left: 0px solid var(--gold); }
    .masonry-item::after  { bottom: 0; right: 0; border-bottom: 0px solid var(--gold); border-right: 0px solid var(--gold); }
    .masonry-item:hover::before { width: 26px; height: 26px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .masonry-item:hover::after  { width: 26px; height: 26px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* Gold shimmer on hover */
    .masonry-item .overlay {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(135deg, transparent 55%, rgba(201,168,76,0.15) 100%);
      opacity: 0; transition: opacity 0.4s ease;
    }
    .masonry-item:hover .overlay { opacity: 1; }

    /* Photo number label */
    .masonry-item .item-label {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      padding: 28px 14px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.72), transparent);
      opacity: 0; transform: translateY(5px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .masonry-item:hover .item-label { opacity: 1; transform: translateY(0); }
    .item-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 300;
      color: rgba(201,168,76,0.75); line-height: 1;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, background 0.3s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
      background: rgba(0,0,0,0.95);
    }

    /* Close button — absolute top-right, does NOT affect image centering */
    .lb-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.6);
      font-size: 16px; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
    }
    .lb-close:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

    /* Image wrapper — centered in the full viewport */
    .lb-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-img-wrap img {
      display: block;
      max-width: 90vw;
      max-height: 82vh;
      width: auto; height: auto;
      object-fit: contain;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .lb-img-wrap.fade img { opacity: 0; transform: scale(0.97); }

    /* Caption — absolute bottom so it never affects centering */
    .lb-caption {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      display: flex; justify-content: space-between; align-items: center;
    }
    .lb-counter { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--gold); }
    .lb-hint { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.2); }
    .lb-credit { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .lb-credit span { color: var(--gold); }

    .lb-prev, .lb-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.75); font-size: 22px;
      display: none; align-items: center; justify-content: center;
      transition: all 0.25s; z-index: 9100;
    }
    .lb-prev { left: 14px; }
    .lb-next { right: 14px; }
    .lb-prev:hover, .lb-next:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.12); }

    /* ── FOOTER ── */
    footer {
      padding: 36px 60px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; letter-spacing: 4px; color: var(--gold); }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) { .masonry-row { /* 3 cols handled by JS */ } }
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { gap: 24px; }
      .page-header { padding: 36px 20px 28px; flex-direction: column; align-items: flex-start; gap: 12px; }
      .masonry-wrap { padding: 20px 10px 60px; }
      .lightbox { padding: 16px 56px; }
      .lb-hint { display: none; }
      .lb-prev { left: 4px; width: 40px; height: 40px; font-size: 18px; }
      .lb-next { right: 4px; width: 40px; height: 40px; font-size: 18px; }
      footer { flex-direction: column; gap: 10px; text-align: center; padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <a href="index.html" class="nav-logo">LPU Clicks</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery1.html" class="active">Gallery</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div>
      <p class="page-eyebrow">LPU Campus · @_____shiva_</p>
      <h1 class="page-title">The <em>Gallery</em></h1>
    </div>
    <div class="photo-count">29<span>photographs</span></div>
  </div>

  <div class="masonry-wrap">
    <!-- JS builds the columns here -->
    <div class="masonry-row" id="masonryRow"></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">✕</button>
    <div class="lb-img-wrap" id="lbImgWrap">
      <div class="lb-frame"></div>
      <img src="" alt="LPU Campus" id="lbImg">
    </div>
    <div class="lb-caption">
      <span class="lb-counter" id="lbCounter">01 / 29</span>
      <span class="lb-hint">← → keys · ESC to close · swipe on mobile</span>
      <span class="lb-credit">@<span>_____shiva_</span></span>
    </div>
  </div>
  <button class="lb-prev" id="lbPrev">&#8592;</button>
  <button class="lb-next" id="lbNext">&#8594;</button>

  <footer>
    <div class="footer-brand">LPU Clicks</div>
    <div class="footer-copy">© 2022 · Web Marketing Project · LPU</div>
  </footer>

  <script>
    const photos = [
      'gallery.jpg/img28.jpg','gallery.jpg/img29.jpg','gallery.jpg/img31.jpg',
      'gallery.jpg/img19.jpg','gallery.jpg/img27.jpg','gallery.jpg/img26.jpg',
      'gallery.jpg/img25.jpg','gallery.jpg/img24.jpg','gallery.jpg/img23.jpg',
      'gallery.jpg/img22.jpg','gallery.jpg/img21.jpg','gallery.jpg/img20.jpg',
      'gallery.jpg/img18.jpg','gallery.jpg/img17.jpg','gallery.jpg/img15.jpg',
      'gallery.jpg/img11.jpg','gallery.jpg/img14.jpg','gallery.jpg/img13.jpg',
      'gallery.jpg/img12.jpg','gallery.jpg/img10.jpg','gallery.jpg/img1.jpg',
      'gallery.jpg/img9.jpg', 'gallery.jpg/img8.jpg', 'gallery.jpg/img7.jpg',
      'gallery.jpg/img6.jpg', 'gallery.jpg/img5.jpg', 'gallery.jpg/img4.jpg',
      'gallery.jpg/img3.jpg', 'gallery.jpg/img2.jpg',
    ];

    // ── BUILD JS MASONRY ──
    // Instead of CSS columns (which breaks hover), we create real separate
    // column divs and distribute photos into them like Pinterest does.
    function getColCount() {
      const w = window.innerWidth;
      if (w <= 480) return 1;
      if (w <= 800) return 2;
      if (w <= 1200) return 3;
      return 4;
    }

    const row = document.getElementById('masonryRow');
    // Store all item elements in order so lightbox can find them by index
    const allItems = [];

    function buildGrid() {
      const colCount = getColCount();
      row.innerHTML = ''; // clear
      allItems.length = 0;

      // Create column divs
      const cols = [];
      for (let c = 0; c < colCount; c++) {
        const col = document.createElement('div');
        col.className = 'masonry-col';
        row.appendChild(col);
        cols.push(col);
      }

      // Distribute photos: round-robin into columns (0,1,2,3,0,1,2,3,...)
      // This is the simplest Pinterest-style distribution
      photos.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.dataset.index = i;
        item.innerHTML = `
          <img src="${src}" alt="LPU Campus photo ${i + 1}">
          <div class="overlay"></div>
          <div class="item-label">
            <span class="item-num">${String(i + 1).padStart(2, '0')}</span>
          </div>`;

        // Direct click listener on each item — no delegation needed
        item.addEventListener('click', () => openLightbox(i));

        cols[i % colCount].appendChild(item);
        allItems.push(item);
      });
    }

    buildGrid();

    // Rebuild on resize so column count stays correct
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(buildGrid, 200);
    });

    // ── LIGHTBOX ──
    const lb     = document.getElementById('lightbox');
    const lbImg  = document.getElementById('lbImg');
    const lbWrap = document.getElementById('lbImgWrap');
    const lbCtr  = document.getElementById('lbCounter');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let current  = 0;

    function updateCounter() {
      lbCtr.textContent = `${String(current + 1).padStart(2, '0')} / ${photos.length}`;
    }

    function openLightbox(idx) {
      current = idx;
      // Get src from the already-loaded thumbnail — never blank
      const thumb = allItems[current].querySelector('img');
      lbImg.src = thumb.currentSrc || thumb.src;
      updateCounter();
      lb.classList.add('open');
      lbPrev.style.display = 'flex';
      lbNext.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      lbPrev.style.display = 'none';
      lbNext.style.display = 'none';
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbWrap.classList.add('fade');
      setTimeout(() => {
        const thumb = allItems[current].querySelector('img');
        lbImg.src = thumb.currentSrc || thumb.src;
        updateCounter();
        lbWrap.classList.remove('fade');
      }, 180);
    }

    document.getElementById('lbClose').onclick = closeLightbox;
    lbPrev.onclick = () => navigate(-1);
    lbNext.onclick = () => navigate(1);
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Touch swipe for mobile
    let tsX = 0, tsY = 0;
    lb.addEventListener('touchstart', e => {
      tsX = e.touches[0].clientX;
      tsY = e.touches[0].clientY;
    }, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tsX;
      const dy = e.changedTouches[0].clientY - tsY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 45) navigate(dx < 0 ? 1 : -1);
    }, { passive: true });

    // ── CUSTOM CURSOR ──
    // Pure JS for position only — no mouseenter/mouseleave needed
    // The ring scale is handled by CSS :hover on the elements directly
    const curDot  = document.getElementById('cursor');
    const curRing = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      curDot.style.left = mx + 'px';
      curDot.style.top  = my + 'px';
      // Check if we're hovering over an interactive element right now
      const el = document.elementFromPoint(mx, my);
      if (el && el.closest('.masonry-item, a, button')) {
        curRing.classList.add('big');
      } else {
        curRing.classList.remove('big');
      }
    });

    (function ringLoop() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      curRing.style.left = rx + 'px';
      curRing.style.top  = ry + 'px';
      requestAnimationFrame(ringLoop);
    })();
  </script>
</body>
</html>
