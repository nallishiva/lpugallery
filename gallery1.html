<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WMXN52Q8JP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WMXN52Q8JP');
  </script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — LPU Clicks</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8295408944534400" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --dark: #0d0d0d;
      --white: #ffffff;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      opacity: 0;
      animation: pageEnter 0.6s ease 0.05s forwards;
    }

    @keyframes pageEnter {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 500;
      padding: 22px 60px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(13,13,13,0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300;
      letter-spacing: 4px; color: var(--gold);
      text-transform: uppercase; text-decoration: none;
    }
    .nav-links { display: flex; gap: 48px; list-style: none; }
    .nav-links a {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.6); text-decoration: none;
      position: relative; transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px; background: var(--gold);
      transition: width 0.3s ease;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 56px 60px 40px;
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .page-eyebrow {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
      display: flex; align-items: center; gap: 14px;
    }
    .page-eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 7vw, 84px);
      font-weight: 300; line-height: 0.95; letter-spacing: -1px;
    }
    .page-title em { font-style: italic; color: var(--gold); }
    .photo-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 68px; font-weight: 300;
      color: rgba(201,168,76,0.12); line-height: 1; letter-spacing: -2px;
    }
    .photo-count span {
      font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.28);
      display: block; text-align: right;
      font-family: 'Outfit', sans-serif; margin-top: 4px;
    }

    /* ── MASONRY GRID ── */
    .masonry-wrap { padding: 40px 36px 80px; }
    .masonry-row { display: flex; gap: 6px; align-items: flex-start; }
    .masonry-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    .masonry-item {
      position: relative;
      overflow: hidden;
      display: block;
      width: 100%;
      cursor: pointer;
    }

    /* Image zoom on hover — pure CSS, works on every image always */
    .masonry-item img {
      width: 100%; display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
      filter: brightness(0.85) contrast(1.05);
    }
    .masonry-item:hover img {
      transform: scale(1.06);
      filter: brightness(1.0) contrast(1.08);
    }

    /* Gold border on hover — pure CSS inset outline */
    .masonry-item::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 3px solid var(--gold);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 3;
    }
    .masonry-item:hover::after { opacity: 1; }

    /* Dark gradient + number on hover */
    .masonry-item .overlay {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .masonry-item:hover .overlay { opacity: 1; }

    .masonry-item .item-num {
      position: absolute; bottom: 12px; left: 16px; z-index: 2;
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 300;
      color: rgba(201,168,76,0.85); line-height: 1;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .masonry-item:hover .item-num { opacity: 1; transform: translateY(0); }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 9999;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    #lightbox.open {
      opacity: 1;
      visibility: visible;
    }

    /* Close button top-right */
    #lbClose {
      position: fixed;
      top: 20px; right: 24px;
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10000;
      transition: border-color 0.2s, color 0.2s;
    }
    #lbClose:hover { border-color: var(--gold); color: var(--gold); }

    /* The image — direct flex child of #lightbox so it centers perfectly */
    #lbImg {
      display: block;
      max-width: 88vw;
      max-height: 88vh;
      width: auto; height: auto;
      object-fit: contain;
      transition: opacity 0.2s ease;
      border: 2px solid rgba(201,168,76,0.4);
      margin: auto;
    }
    #lbImg.fade { opacity: 0; }

    /* Caption bottom */
    #lbCaption {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      display: flex; justify-content: space-between; align-items: center;
      pointer-events: none;
    }
    #lbCounter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300; color: var(--gold);
    }
    #lbHint { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.2); }
    #lbCredit { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    #lbCredit span { color: var(--gold); }

    /* Prev / Next arrows */
    #lbPrev, #lbNext {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8); font-size: 22px;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10000;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    #lbPrev { left: 14px; }
    #lbNext { right: 14px; }
    #lbPrev:hover, #lbNext:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

    /* ── FOOTER ── */
    footer {
      padding: 36px 60px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; letter-spacing: 4px; color: var(--gold); }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; } .nav-links { gap: 24px; }
      .page-header { padding: 36px 20px 28px; flex-direction: column; align-items: flex-start; gap: 12px; }
      .masonry-wrap { padding: 20px 10px 60px; }
      #lbHint { display: none; }
      #lbPrev { left: 6px; width: 40px; height: 40px; font-size: 18px; }
      #lbNext { right: 6px; width: 40px; height: 40px; font-size: 18px; }
      footer { flex-direction: column; gap: 10px; text-align: center; padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">LPU Clicks</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery1.html" class="active">Gallery</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div>
      <p class="page-eyebrow">LPU Campus · @_____shiva_</p>
      <h1 class="page-title">The <em>Gallery</em></h1>
    </div>
    <div class="photo-count">29<span>photographs</span></div>
  </div>

  <div class="masonry-wrap">
    <div class="masonry-row" id="masonryRow"></div>
  </div>

  <!-- LIGHTBOX — sits directly on body, nothing wrapping it -->
  <div id="lightbox">
    <img id="lbImg" src="" alt="LPU Campus">
  </div>
  <button id="lbClose">✕</button>
  <div id="lbCaption">
    <span id="lbCounter">01 / 29</span>
    <span id="lbHint">← → keys · ESC to close · swipe on mobile</span>
    <span id="lbCredit">@<span>_____shiva_</span></span>
  </div>
  <button id="lbPrev">&#8592;</button>
  <button id="lbNext">&#8594;</button>

  <footer>
    <div class="footer-brand">LPU Clicks</div>
    <div class="footer-copy">© 2022 · Web Marketing Project · LPU</div>
  </footer>

  <script>
    const photos = [
      'gallery.jpg/img28.jpg','gallery.jpg/img29.jpg','gallery.jpg/img31.jpg',
      'gallery.jpg/img19.jpg','gallery.jpg/img27.jpg','gallery.jpg/img26.jpg',
      'gallery.jpg/img25.jpg','gallery.jpg/img24.jpg','gallery.jpg/img23.jpg',
      'gallery.jpg/img22.jpg','gallery.jpg/img21.jpg','gallery.jpg/img20.jpg',
      'gallery.jpg/img18.jpg','gallery.jpg/img17.jpg','gallery.jpg/img15.jpg',
      'gallery.jpg/img11.jpg','gallery.jpg/img14.jpg','gallery.jpg/img13.jpg',
      'gallery.jpg/img12.jpg','gallery.jpg/img10.jpg','gallery.jpg/img1.jpg',
      'gallery.jpg/img9.jpg', 'gallery.jpg/img8.jpg', 'gallery.jpg/img7.jpg',
      'gallery.jpg/img6.jpg', 'gallery.jpg/img5.jpg', 'gallery.jpg/img4.jpg',
      'gallery.jpg/img3.jpg', 'gallery.jpg/img2.jpg',
    ];

    // ── BUILD GRID ──
    function getColCount() {
      const w = window.innerWidth;
      if (w <= 480) return 1;
      if (w <= 800) return 2;
      if (w <= 1200) return 3;
      return 4;
    }

    const row = document.getElementById('masonryRow');

    function buildGrid() {
      const colCount = getColCount();
      row.innerHTML = '';

      const cols = [];
      for (let c = 0; c < colCount; c++) {
        const col = document.createElement('div');
        col.className = 'masonry-col';
        row.appendChild(col);
        cols.push(col);
      }

      photos.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        // Pure HTML — no JS hover listeners needed at all
        // CSS :hover handles everything
        item.innerHTML = `
          <img src="${src}" alt="LPU Campus photo ${i + 1}">
          <div class="overlay"></div>
          <span class="item-num">${String(i + 1).padStart(2, '0')}</span>`;
        item.addEventListener('click', () => openLightbox(i));
        cols[i % colCount].appendChild(item);
      });
    }

    buildGrid();

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(buildGrid, 200);
    });

    // ── LIGHTBOX ──
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lbImg');
    const lbCtr   = document.getElementById('lbCounter');
    const lbClose = document.getElementById('lbClose');
    const lbPrev  = document.getElementById('lbPrev');
    const lbNext  = document.getElementById('lbNext');
    const lbCap   = document.getElementById('lbCaption');
    let current   = 0;

    function openLightbox(idx) {
      current = idx;
      lbImg.src = photos[current];
      lbCtr.textContent = `${String(current + 1).padStart(2, '0')} / ${photos.length}`;
      lb.classList.add('open');
      lbClose.style.display = 'flex';
      lbPrev.style.display  = 'flex';
      lbNext.style.display  = 'flex';
      lbCap.style.display   = 'flex';
      // Lock body scroll WITHOUT shifting the page position
      const scrollY = window.scrollY;
      document.body.style.position = 'fixed';
      document.body.style.top = `-${scrollY}px`;
      document.body.style.width = '100%';
      document.body.dataset.scrollY = scrollY;
    }

    function closeLightbox() {
      lb.classList.remove('open');
      lbClose.style.display = 'none';
      lbPrev.style.display  = 'none';
      lbNext.style.display  = 'none';
      lbCap.style.display   = 'none';
      // Restore scroll position exactly where user was
      const scrollY = parseInt(document.body.dataset.scrollY || '0');
      document.body.style.position = '';
      document.body.style.top = '';
      document.body.style.width = '';
      window.scrollTo(0, scrollY);
    }

    function navigate(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.classList.add('fade');
      setTimeout(() => {
        lbImg.src = photos[current];
        lbCtr.textContent = `${String(current + 1).padStart(2, '0')} / ${photos.length}`;
        lbImg.classList.remove('fade');
      }, 200);
    }

    // Hide caption/arrows by default
    lbClose.style.display = 'none';
    lbPrev.style.display  = 'none';
    lbNext.style.display  = 'none';
    lbCap.style.display   = 'none';

    lbClose.onclick = closeLightbox;
    lbPrev.onclick  = () => navigate(-1);
    lbNext.onclick  = () => navigate(1);

    // Click dark backdrop to close
    lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Swipe on mobile
    let tsX = 0, tsY = 0;
    lb.addEventListener('touchstart', e => {
      tsX = e.touches[0].clientX; tsY = e.touches[0].clientY;
    }, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tsX;
      const dy = e.changedTouches[0].clientY - tsY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 45) navigate(dx < 0 ? 1 : -1);
    }, { passive: true });
  </script>
</body>
</html>
